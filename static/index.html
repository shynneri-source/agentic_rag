<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic RAG</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', Arial, ui-sans-serif, system-ui, sans-serif;
            background: #ffffff;
            color: #212121;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
            background: #ffffff;
            position: relative;
        }

        .sidebar {
            position: fixed;
            top: 0;
            left: -300px;
            width: 300px;
            height: 100vh;
            background: #ffffff;
            border-right: 1px solid #e5e7eb;
            z-index: 1000;
            transition: left 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .sidebar.open {
            left: 0;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-title {
            color: #17171c;
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.28px;
            text-transform: uppercase;
            font-family: 'Inter', Arial, ui-sans-serif, system-ui, sans-serif;
        }

        .close-sidebar {
            width: 32px;
            height: 32px;
            border: 1px solid #d9d9dd;
            background: transparent;
            color: #75758a;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            transition: all 0.2s ease;
        }

        .close-sidebar:hover {
            background: #f2f2f2;
            color: #17171c;
        }

        .sidebar-actions {
            padding: 16px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .new-chat-button {
            padding: 12px 24px;
            background: #000000;
            color: #ffffff;
            border: none;
            border-radius: 32px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', Arial, ui-sans-serif, system-ui, sans-serif;
            line-height: 1.71;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .new-chat-button:hover {
            background: #17171c;
        }

        .clear-all-button {
            padding: 12px 24px;
            background: transparent;
            color: #75758a;
            border: 1px solid #d9d9dd;
            border-radius: 32px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            font-family: 'Inter', Arial, ui-sans-serif, system-ui, sans-serif;
            line-height: 1.71;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: center;
        }

        .clear-all-button:hover {
            border-color: #b30000;
            color: #b30000;
        }

        .sidebar-content {
            flex: 1;
            padding: 8px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #d9d9dd transparent;
        }

        .sidebar-content::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-content::-webkit-scrollbar-thumb {
            background: #d9d9dd;
            border-radius: 30px;
        }

        .chat-history-item {
            padding: 12px 16px;
            margin-bottom: 4px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease;
            border: 1px solid transparent;
        }

        .chat-history-item:hover {
            background: #f2f2f2;
        }

        .chat-history-item.active {
            background: #f2f2f2;
            border-color: #d9d9dd;
        }

        .chat-history-date {
            color: #93939f;
            font-size: 12px;
            line-height: 1.4;
            margin-bottom: 4px;
        }

        .chat-history-preview {
            color: #212121;
            font-size: 14px;
            line-height: 1.4;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            z-index: 999;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .sidebar-overlay.show {
            opacity: 1;
            visibility: visible;
        }

        .header {
            background: #ffffff;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e5e7eb;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .menu-button {
            width: 36px;
            height: 36px;
            border: 1px solid #d9d9dd;
            background: transparent;
            color: #212121;
            border-radius: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .menu-button:hover {
            background: #f2f2f2;
        }

        .header h1 {
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.28px;
            text-transform: uppercase;
            color: #75758a;
            font-family: 'Inter', Arial, ui-sans-serif, system-ui, sans-serif;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: #93939f;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 9999px;
            background: #003c33;
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        .messages {
            flex: 1;
            padding: 40px 24px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            background: #ffffff;
            max-width: 720px;
            margin: 0 auto;
            width: 100%;
            scrollbar-width: thin;
            scrollbar-color: #d9d9dd transparent;
        }

        .messages::-webkit-scrollbar {
            width: 4px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #d9d9dd;
            border-radius: 30px;
        }

        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease-out;
            max-width: 100%;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 28px;
            height: 28px;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            flex-shrink: 0;
            background: #ffffff;
            color: #212121;
            border: 1px solid #d9d9dd;
        }

        .message.user .message-avatar {
            background: #17171c;
            color: #ffffff;
            border: none;
        }

        .message.assistant .message-avatar {
            background: #ffffff;
            color: #003c33;
            border: 1px solid #003c33;
        }

        .message-content {
            flex: 1;
            max-width: 85%;
            min-width: 0;
        }

        .message.user .message-content {
            max-width: 65%;
        }

        .message-text {
            line-height: 1.6;
            word-wrap: break-word;
            color: #212121;
            font-size: 16px;
        }

        .message.user .message-text {
            background: #17171c;
            color: #ffffff;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
        }

        .message-text strong, .message-text b {
            font-weight: 600;
        }

        .message-text code {
            background: #f2f2f2;
            color: #212121;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'SF Mono', 'Consolas', 'Monaco', monospace;
            font-size: 0.875em;
        }

        .message.user .message-text code {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        .message-text pre {
            background: #f2f2f2;
            color: #212121;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 12px 0;
            border: 1px solid #e5e7eb;
        }

        .message-text pre code {
            background: none;
            padding: 0;
        }

        .message-text h1, .message-text h2, .message-text h3 {
            color: #17171c;
            margin: 16px 0 8px 0;
            font-weight: 400;
        }

        .message-text h1 { font-size: 24px; line-height: 1.2; letter-spacing: -0.32px; }
        .message-text h2 { font-size: 20px; line-height: 1.2; }
        .message-text h3 { font-size: 18px; line-height: 1.3; }

        .message-text p {
            margin: 8px 0;
            line-height: 1.6;
        }

        .message-text ul, .message-text ol {
            margin: 8px 0;
            padding-left: 20px;
        }

        .message-text li {
            margin: 4px 0;
        }

        .message-text blockquote {
            border-left: 3px solid #d9d9dd;
            padding-left: 16px;
            margin: 12px 0;
            color: #75758a;
        }

        .message-text a {
            color: #1863dc;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        .message-text a:hover {
            color: #17171c;
        }

        .message-meta {
            margin-top: 8px;
            font-size: 12px;
            color: #93939f;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .message-sources {
            margin-top: 12px;
            padding-top: 12px;
            border-top: 1px solid #e5e7eb;
        }

        .source-tag {
            display: inline-block;
            background: #f2f2f2;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            color: #75758a;
            margin: 2px;
        }

        .message.user .source-tag {
            background: rgba(255, 255, 255, 0.1);
        }

        .input-container {
            padding: 16px 24px 24px;
            background: #ffffff;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            width: 100%;
            flex-shrink: 0;
        }

        .input-wrapper {
            position: relative;
            max-width: 720px;
            width: 100%;
            display: flex;
            align-items: flex-end;
            gap: 12px;
        }

        .input-field-container {
            flex: 1;
            position: relative;
        }

        .message-input {
            width: 100%;
            padding: 12px 48px 12px 16px;
            border: 1px solid #d9d9dd;
            border-radius: 30px;
            font-size: 14px;
            font-family: 'Inter', Arial, ui-sans-serif, system-ui, sans-serif;
            outline: none;
            transition: all 0.2s ease;
            resize: none;
            min-height: 44px;
            max-height: 200px;
            background: #ffffff;
            color: #212121;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .message-input::-webkit-scrollbar {
            display: none;
        }

        .message-input::placeholder {
            color: #93939f;
        }

        .message-input:focus {
            border-color: #4c6ee6;
            box-shadow: 0 0 0 2px rgba(76, 110, 230, 0.2);
        }

        .send-button {
            position: absolute;
            right: 6px;
            bottom: 6px;
            width: 32px;
            height: 32px;
            border: none;
            background: #17171c;
            color: #ffffff;
            border-radius: 9999px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            font-size: 0.875rem;
        }

        .send-button:hover:not(:disabled) {
            background: #000000;
        }

        .send-button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .additional-options {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .option-button {
            padding: 8px 14px;
            background: transparent;
            color: #75758a;
            border: 1px solid #d9d9dd;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            font-family: 'Inter', Arial, ui-sans-serif, system-ui, sans-serif;
            white-space: nowrap;
        }

        .option-button:hover {
            background: #f2f2f2;
            color: #17171c;
            border-color: #17171c;
        }

        .loading {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 16px;
            color: #75758a;
        }

        .loading-dots {
            display: flex;
            gap: 4px;
        }

        .loading-dot {
            width: 5px;
            height: 5px;
            border-radius: 9999px;
            background: #93939f;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .loading-dot:nth-child(1) { animation-delay: -0.32s; }
        .loading-dot:nth-child(2) { animation-delay: -0.16s; }
        .loading-dot:nth-child(3) { animation-delay: 0s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .empty-state-icon {
            width: 64px;
            height: 64px;
            border-radius: 22px;
            background: #f2f2f2;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 24px;
            color: #17171c;
            font-size: 1.5rem;
        }

        .empty-state h2 {
            font-size: 32px;
            font-weight: 400;
            line-height: 1.2;
            letter-spacing: -0.32px;
            color: #17171c;
            margin-bottom: 8px;
        }

        .empty-state p {
            font-size: 16px;
            color: #93939f;
            line-height: 1.5;
            max-width: 360px;
        }

        .empty-state-suggestions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 24px;
            justify-content: center;
        }

        .suggestion-chip {
            padding: 8px 16px;
            background: #f2f2f2;
            color: #212121;
            border: 1px solid transparent;
            border-radius: 30px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Inter', Arial, ui-sans-serif, system-ui, sans-serif;
            transition: all 0.2s ease;
        }

        .suggestion-chip:hover {
            background: #ffffff;
            border-color: #17171c;
        }

        .stream-container {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin: 12px 0;
            overflow: hidden;
            background: #ffffff;
        }

        .stream-header {
            background: #f2f2f2;
            padding: 10px 14px;
            border-bottom: 1px solid #e5e7eb;
            font-size: 12px;
            color: #75758a;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.28px;
            text-transform: uppercase;
        }

        .stream-step {
            padding: 10px 14px;
            border-bottom: 1px solid #e5e7eb;
            animation: slideIn 0.3s ease-out;
        }

        .stream-step:last-child {
            border-bottom: none;
        }

        .stream-step.thinking {
            border-left: 2px solid #9b60aa;
        }

        .stream-step.query_generation {
            border-left: 2px solid #ff7759;
        }

        .stream-step.rag_search {
            border-left: 2px solid #003c33;
        }

        .stream-step.reflection {
            border-left: 2px solid #1863dc;
        }

        .stream-step.answer {
            border-left: 2px solid #17171c;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-8px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .stream-step-header {
            font-weight: 500;
            color: #17171c;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
        }

        .stream-step-content {
            color: #75758a;
            line-height: 1.4;
            font-size: 13px;
        }

        .stream-step-data {
            margin-top: 8px;
            font-size: 12px;
            color: #93939f;
        }

        .query-list {
            margin-top: 6px;
            padding-left: 0;
            list-style: none;
        }

        .query-item {
            background: #f2f2f2;
            padding: 6px 10px;
            margin: 4px 0;
            border-radius: 4px;
            font-style: italic;
            font-size: 12px;
            color: #212121;
        }

        @media (max-width: 768px) {
            .header {
                padding: 10px 16px;
            }

            .messages {
                padding: 24px 16px 16px;
                gap: 20px;
            }

            .input-container {
                padding: 12px 16px 16px;
            }

            .message-content {
                max-width: 100%;
            }

            .message.user .message-content {
                max-width: 80%;
            }

            .sidebar {
                width: 280px;
                left: -280px;
            }

            .empty-state h2 {
                font-size: 24px;
            }

            .additional-options .option-button span {
                display: none;
            }
        }

        @media (max-width: 425px) {
            .header h1 {
                font-size: 12px;
            }

            .messages {
                padding: 16px 12px 12px;
            }

            .input-container {
                padding: 8px 12px 12px;
            }

            .message-input {
                padding: 10px 44px 10px 14px;
                font-size: 13px;
                min-height: 40px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-title">History</span>
            <button class="close-sidebar" onclick="toggleSidebar()">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <div class="sidebar-actions">
            <button class="new-chat-button" onclick="startNewChat()">
                <i class="fas fa-plus"></i>
                New chat
            </button>
            <button class="clear-all-button" onclick="clearAllChats()">
                <i class="fas fa-trash-alt"></i>
                Clear history
            </button>
        </div>

        <div class="sidebar-content" id="chatHistory">
        </div>
    </div>

    <div class="container">
        <div class="header">
            <div class="header-left">
                <button class="menu-button" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <h1>Agentic RAG</h1>
            </div>
            <div class="header-right">
                <div class="status-indicator">
                    <span class="status-dot"></span>
                    <span>Ready</span>
                </div>
            </div>
        </div>

        <div class="chat-container">
            <div class="messages" id="messages">
                <div class="empty-state">
                    <div class="empty-state-icon">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <h2>Ask anything</h2>
                    <p>Retrieval-augmented generation with multi-step reasoning and reflection</p>
                    <div class="empty-state-suggestions">
                        <button class="suggestion-chip" onclick="setSuggestion(this)">What is this project?</button>
                        <button class="suggestion-chip" onclick="setSuggestion(this)">How does RAG work?</button>
                        <button class="suggestion-chip" onclick="setSuggestion(this)">Explain the architecture</button>
                        <button class="suggestion-chip" onclick="setSuggestion(this)">Query the document store</button>
                    </div>
                </div>
            </div>

            <div class="input-container">
                <div class="input-wrapper">
                    <div class="input-field-container">
                        <textarea
                            class="message-input"
                            id="messageInput"
                            placeholder="Type your message..."
                            rows="1"
                        ></textarea>
                        <button class="send-button" id="sendButton" onclick="sendMessage()">
                            <i class="fas fa-arrow-up"></i>
                        </button>
                    </div>
                    <div class="additional-options">
                        <button class="option-button" onclick="toggleStreamMode()">
                            <i class="fas fa-stream" id="streamIcon"></i>
                            <span id="streamText">Stream</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let isLoading = false;
        let streamMode = true;
        let messagesContainer = document.getElementById('messages');
        let messageInput = document.getElementById('messageInput');
        let sendButton = document.getElementById('sendButton');
        let currentStreamContainer = null;
        let chatSessions = [];

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            sidebar.classList.toggle('open');
            overlay.classList.toggle('show');
            if (sidebar.classList.contains('open')) {
                loadChatSessions();
            }
        }

        function setSuggestion(el) {
            messageInput.value = el.textContent;
            messageInput.style.height = 'auto';
            messageInput.style.height = messageInput.scrollHeight + 'px';
            sendMessage();
        }

        function startNewChat() {
            const messages = messagesContainer.children;
            if (messages.length > 1) {
                saveChatSession();
            }
            clearChatSilently();
            toggleSidebar();
        }

        function saveChatSession() {
            const messages = [];
            const messageElements = messagesContainer.querySelectorAll('.message');
            messageElements.forEach(msgEl => {
                const role = msgEl.classList.contains('user') ? 'user' : 'assistant';
                const textEl = msgEl.querySelector('.message-text');
                if (!textEl) return;
                const content = textEl.innerText;
                messages.push({ role, content, timestamp: new Date().toISOString() });
            });
            if (messages.length > 0) {
                const session = {
                    id: Date.now(),
                    title: messages[0].content.substring(0, 50) + (messages[0].content.length > 50 ? '...' : ''),
                    messages: messages,
                    createdAt: new Date().toISOString()
                };
                chatSessions.unshift(session);
                localStorage.setItem('chatSessions', JSON.stringify(chatSessions));
            }
        }

        function loadChatSessions() {
            const saved = localStorage.getItem('chatSessions');
            if (saved) {
                chatSessions = JSON.parse(saved);
            }
            const chatHistoryContainer = document.getElementById('chatHistory');
            if (chatSessions.length === 0) {
                chatHistoryContainer.innerHTML = '<div style="color: #93939f; text-align: center; padding: 24px; font-size: 14px;">No chat history yet</div>';
                return;
            }
            chatHistoryContainer.innerHTML = '';
            chatSessions.forEach(session => {
                const historyItem = document.createElement('div');
                historyItem.className = 'chat-history-item';
                historyItem.onclick = () => loadChatSession(session);
                const date = new Date(session.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                const time = new Date(session.createdAt).toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
                historyItem.innerHTML = `
                    <div class="chat-history-date">${date} · ${time}</div>
                    <div class="chat-history-preview">${session.title}</div>
                `;
                chatHistoryContainer.appendChild(historyItem);
            });
        }

        function loadChatSession(session) {
            clearChatSilently();
            session.messages.forEach(msg => {
                addMessage(msg.role, msg.content, [], {});
            });
            toggleSidebar();
        }

        function clearChatSilently() {
            messagesContainer.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">
                        <i class="fas fa-layer-group"></i>
                    </div>
                    <h2>Ask anything</h2>
                    <p>Retrieval-augmented generation with multi-step reasoning and reflection</p>
                    <div class="empty-state-suggestions">
                        <button class="suggestion-chip" onclick="setSuggestion(this)">What is this project?</button>
                        <button class="suggestion-chip" onclick="setSuggestion(this)">How does RAG work?</button>
                        <button class="suggestion-chip" onclick="setSuggestion(this)">Explain the architecture</button>
                        <button class="suggestion-chip" onclick="setSuggestion(this)">Query the document store</button>
                    </div>
                </div>
            `;
        }

        function clearAllChats() {
            if (!confirm('Are you sure? This action cannot be undone.')) return;
            try {
                chatSessions = [];
                localStorage.removeItem('chatSessions');
                clearChatSilently();
                loadChatSessions();
                toggleSidebar();
            } catch (error) {
                console.error('Error clearing history:', error);
            }
        }

        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
        });

        messageInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function toggleStreamMode() {
            streamMode = !streamMode;
            const icon = document.getElementById('streamIcon');
            const text = document.getElementById('streamText');
            if (streamMode) {
                icon.className = 'fas fa-stream';
                text.textContent = 'Stream';
            } else {
                icon.className = 'fas fa-bolt';
                text.textContent = 'Fast';
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isLoading) return;

            const emptyState = messagesContainer.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            addMessage('user', message);

            messageInput.value = '';
            messageInput.style.height = 'auto';

            if (streamMode) {
                await sendStreamMessage(message);
            } else {
                await sendRegularMessage(message);
            }

            setTimeout(() => {
                const messageElements = messagesContainer.querySelectorAll('.message');
                if (messageElements.length >= 2) {
                    saveChatSession();
                }
            }, 1000);
        }

        async function sendStreamMessage(message) {
            showStreamLoading();

            try {
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        config: {}
                    })
                });

                if (!response.ok) {
                    throw new Error('Network response was not ok');
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                handleStreamMessage(data);
                            } catch (e) {
                                console.error('Error parsing stream data:', e);
                            }
                        }
                    }
                }

            } catch (error) {
                hideStreamLoading();
                addMessage('assistant', `Sorry, an error occurred: ${error.message}`, [], {});
            }
        }

        async function sendRegularMessage(message) {
            showLoading();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        config: {}
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'An error occurred');
                }

                hideLoading();
                addMessage('assistant', data.response, data.sources, data.stats);

            } catch (error) {
                hideLoading();
                addMessage('assistant', `Sorry, an error occurred: ${error.message}`, [], {});
            }
        }

        function handleStreamMessage(data) {
            if (data.type === 'thinking') {
                showStreamStep('thinking', 'Thinking', data.content, data.data);
            } else if (data.type === 'query_generation') {
                showStreamStep('query_generation', 'Query generation', data.content, data.data);
            } else if (data.type === 'rag_search') {
                showStreamStep('rag_search', 'Searching', data.content, data.data);
            } else if (data.type === 'reflection') {
                showStreamStep('reflection', 'Reflecting', data.content, data.data);
            } else if (data.type === 'answer') {
                hideStreamLoading();
                addMessage('assistant', data.content, data.data.sources || [], data.data.stats || {});
            } else if (data.type === 'complete') {
                hideStreamLoading();
            } else if (data.type === 'error') {
                hideStreamLoading();
                addMessage('assistant', data.content, [], {});
            }
        }

        function showStreamStep(type, title, content, data) {
            if (!currentStreamContainer) return;

            const stepDiv = document.createElement('div');
            stepDiv.className = `stream-step ${type}`;

            const stepHeader = document.createElement('div');
            stepHeader.className = 'stream-step-header';

            let icon = '';
            switch(type) {
                case 'thinking': icon = '<i class="fas fa-brain"></i>'; break;
                case 'query_generation': icon = '<i class="fas fa-search"></i>'; break;
                case 'rag_search': icon = '<i class="fas fa-database"></i>'; break;
                case 'reflection': icon = '<i class="fas fa-eye"></i>'; break;
                default: icon = '<i class="fas fa-cog"></i>';
            }

            stepHeader.innerHTML = `${icon} ${title}`;

            const stepContent = document.createElement('div');
            stepContent.className = 'stream-step-content';
            stepContent.textContent = content;

            stepDiv.appendChild(stepHeader);
            stepDiv.appendChild(stepContent);

            if (data && Object.keys(data).length > 0) {
                const stepData = document.createElement('div');
                stepData.className = 'stream-step-data';

                if (data.queries && data.queries.length > 0) {
                    const queryList = document.createElement('div');
                    queryList.className = 'query-list';
                    data.queries.forEach(query => {
                        const queryItem = document.createElement('div');
                        queryItem.className = 'query-item';
                        queryItem.textContent = query;
                        queryList.appendChild(queryItem);
                    });
                    stepData.appendChild(queryList);
                }

                if (data.query) {
                    stepData.innerHTML += `<strong>Query:</strong> "${data.query}"`;
                }

                if (data.results_count !== undefined) {
                    stepData.innerHTML += `<br><strong>Results:</strong> ${data.results_count}`;
                }

                if (data.is_sufficient !== undefined) {
                    if (data.is_sufficient) {
                        stepData.innerHTML += `<br><strong>Status:</strong> Sufficient information`;
                    } else {
                        stepData.innerHTML += `<br><strong>Status:</strong> Need more information`;
                        if (data.knowledge_gap) {
                            stepData.innerHTML += `<br><strong>Gap:</strong> ${data.knowledge_gap}`;
                        }
                    }
                }

                if (data.rag_loop_count !== undefined) {
                    stepData.innerHTML += `<br><strong>RAG loop:</strong> ${data.rag_loop_count}`;
                }

                if (data.follow_up_queries && data.follow_up_queries.length > 0) {
                    stepData.innerHTML += `<br><strong>Follow-up queries:</strong> ${data.follow_up_queries.length}`;
                }

                stepDiv.appendChild(stepData);
            }

            currentStreamContainer.appendChild(stepDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showStreamLoading() {
            isLoading = true;
            sendButton.disabled = true;

            const messageDiv = document.createElement('div');
            messageDiv.className = 'message assistant';
            messageDiv.id = 'stream-message';

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = '<i class="fas fa-robot"></i>';

            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';

            const streamContainer = document.createElement('div');
            streamContainer.className = 'stream-container';
            streamContainer.id = 'stream-container';

            const streamHeader = document.createElement('div');
            streamHeader.className = 'stream-header';
            streamHeader.innerHTML = '<i class="fas fa-cogs"></i> Processing';

            streamContainer.appendChild(streamHeader);
            messageContent.appendChild(streamContainer);
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(messageContent);

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            currentStreamContainer = streamContainer;
        }

        function hideStreamLoading() {
            isLoading = false;
            sendButton.disabled = false;
            currentStreamContainer = null;
        }

        function addMessage(role, content, sources = [], stats = {}) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;

            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.innerHTML = role === 'user' ? '<i class="fas fa-user"></i>' : '<i class="fas fa-robot"></i>';

            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';

            const messageText = document.createElement('div');
            messageText.className = 'message-text';

            if (role === 'assistant') {
                try {
                    messageText.innerHTML = marked.parse(content);
                } catch (error) {
                    messageText.innerHTML = content.replace(/\n/g, '<br>');
                }
            } else {
                messageText.innerHTML = content.replace(/\n/g, '<br>');
            }

            messageContent.appendChild(messageText);

            if (sources && sources.length > 0) {
                const sourcesDiv = document.createElement('div');
                sourcesDiv.className = 'message-sources';
                sourcesDiv.innerHTML = '<strong style="font-size:12px;color:#93939f;">Sources:</strong> ' +
                    sources.map(source => `<span class="source-tag">${source}</span>`).join('');
                messageContent.appendChild(sourcesDiv);
            }

            if (role === 'assistant' && stats && Object.keys(stats).length > 0) {
                const metaDiv = document.createElement('div');
                metaDiv.className = 'message-meta';

                let statsText = [];
                if (stats.rag_loop_count !== undefined) statsText.push(`${stats.rag_loop_count} RAG loops`);
                if (stats.total_queries !== undefined) statsText.push(`${stats.total_queries} queries`);
                if (stats.unique_sources !== undefined) statsText.push(`${stats.unique_sources} sources`);

                metaDiv.innerHTML = `
                    <span>${statsText.join(' · ')}</span>
                    <span>${new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' })}</span>
                `;
                messageContent.appendChild(metaDiv);
            }

            messageDiv.appendChild(avatar);
            messageDiv.appendChild(messageContent);

            messagesContainer.appendChild(messageDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function showLoading() {
            isLoading = true;
            sendButton.disabled = true;

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading';
            loadingDiv.id = 'loading';
            loadingDiv.innerHTML = `
                <div class="message-avatar" style="background:#003c33;color:#ffffff;border:none;">
                    <i class="fas fa-robot"></i>
                </div>
                <div class="message-content" style="flex-direction:row;display:flex;align-items:center;gap:12px;">
                    <span style="color:#75758a;font-size:14px;">Searching and processing...</span>
                    <div class="loading-dots">
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                        <div class="loading-dot"></div>
                    </div>
                </div>
            `;

            messagesContainer.appendChild(loadingDiv);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function hideLoading() {
            isLoading = false;
            sendButton.disabled = false;
            const loading = document.getElementById('loading');
            if (loading) {
                loading.remove();
            }
        }

        async function loadChatHistory() {
            try {
                const response = await fetch('/api/chat/history');
                const data = await response.json();

                if (data.messages && data.messages.length > 0) {
                    const emptyState = messagesContainer.querySelector('.empty-state');
                    if (emptyState) {
                        emptyState.remove();
                    }

                    data.messages.forEach(msg => {
                        addMessage(msg.role, msg.content, msg.sources || [], msg.stats || {});
                    });
                }
            } catch (error) {
                console.error('Error loading chat history:', error);
            }
        }

        window.addEventListener('load', loadChatHistory);
    </script>
</body>
</html>
